<script>
  const V=(n)=>`rgb(var(--c-${n}) / <alpha-value>)`;
  const scale=(name,keys)=>Object.fromEntries(keys.map(k=>[k,V(name+'-'+k)]));
  tailwind.config={darkMode:'class',theme:{extend:{
    fontFamily:{sans:['Inter','Segoe UI','system-ui','-apple-system','BlinkMacSystemFont','Helvetica Neue','Arial','sans-serif'],

    --c-ink-950:241 245 249; --c-ink-900:255 255 255; --c-ink-850:255 255 255; --c-ink-800:241 245 249; --c-ink-700:203 213 225; --c-ink-600:148 163 184; --c-ink-500:100 116 139;
    --c-zinc-100:15 23 42; --c-zinc-200:23 33 54; --c-zinc-300:38 50 71; --c-zinc-400:51 65 85; --c-zinc-500:71 85 105; --c-zinc-600:100 116 139;
    --c-emerald-200:4 120 87; --c-emerald-300:5 150 105; --c-emerald-400:5 150 105; --c-emerald-500:16 185 129; --c-emerald-600:4 120 87;

<body class="bg-ink-950 text-zinc-100 font-sans antialiased h-screen overflow-hidden">

<div id="offline" class="hidden px-4 py-2 text-xs bg-amber-500/10 text-amber-300 border-b border-amber-500/30"></div>

  <button id="btnToggleList" class="mr-3 bg-ink-800 border border-ink-700 rounded-md px-2 py-1 text-zinc-300 hover:border-emerald-500 text-xs">menu</button>

<div id="modalRoot"></div>

<script>
const PROVIDERS=["brave","tavily","firecrawl"];
const LABELS=["contains_gold_answer","contradicts_gold_answer","is_garbage"];
const SURFACES=["snippet_only","page_visible"];
const KIMI_VALUES=[true,false];
const LEAF_QUOTA_TARGET=5;
const STATUSES=[{k:"all",label:"All"},{k:"pending",label:"Pending"},{k:"done",label:"Done"}];
const VALUES=[{k:"all",label:"All"},{k:"true",label:"Kimi true"},{k:"false",label:"Kimi false"}];
const PATTERNS=[
  ["","none / not needed"],
  ["alias_or_formatting","alias / formatting"],
  ["partial_relation_insufficient","partial relation insufficient"],
  ["outdated_or_conflicting_page","outdated / conflicting page"],
  ["garbage_boundary","garbage boundary"],
  ["span_missing_or_broad","span missing / broad"],
  ["judge_too_strict","judge too strict"],
  ["judge_too_lenient","judge too lenient"],
  ["other","other"]
];
const CARD="border border-ink-700 bg-ink-850/40 rounded-xl p-4 mb-4 shadow-[0_2px_10px_rgba(0,0,0,0.20)]";
const SECH="text-[12px] uppercase tracking-wide text-zinc-500 mb-2.5 font-medium";

let CASES=[], PROGRESS={}, META={}, SEL=null, ACTIVE_TAB="brief", FILT={provider:"all",label:"all",surface:"all",status:"pending",value:"all",q:""};
let saveTimer=null;
const $=s=>document.querySelector(s);

function esc(s){return String(s ?? "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));}
function api(path,opts){return fetch(path,opts).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});}
function boolText(v){return v===true?"true":v===false?"false":"null";}
function humanBool(v){return v==="true"?true:v==="false"?false:null;}
function isDone(id){return !!(PROGRESS[id]||{}).human_value;}
function isPartial(id){const p=PROGRESS[id]||{};return !isDone(id)&&!!(p.human_disagreement_pattern||p.human_notes);}
function agrees(c){const hv=humanBool((PROGRESS[c.case_id]||{}).human_value);return hv===null?null:(hv===c.kimi_value);}
function chipClass(active){return active?"bg-emerald-500/10 text-emerald-200 border-emerald-500/40":"bg-ink-800 text-zinc-400 border-ink-700 hover:border-ink-600";}
function badge(text,cls){return `<span class="px-2 py-0.5 rounded-md text-[11px] font-mono border ${cls}">${esc(text)}</span>`;}
function boolBadge(v,label){const cls=v===true?"bg-emerald-500/15 text-emerald-300 border-emerald-500/30":v===false?"bg-rose-500/15 text-rose-300 border-rose-500/30":"bg-ink-800 text-zinc-500 border-ink-700";return badge(`${label}: ${boolText(v)}`,cls);}
function labelShort(x){return x.replace("contains_gold_answer","contains_gold").replace("contradicts_gold_answer","contradicts_gold");}
function dotClass(id){return isDone(id)?"bg-emerald-400":isPartial(id)?"bg-amber-400":"bg-zinc-600";}
function providerCls(p){return p==="brave"?"bg-rose-500/15 text-rose-300 border-rose-500/30":p==="tavily"?"bg-sky-500/15 text-sky-300 border-sky-500/30":"bg-emerald-500/15 text-emerald-300 border-emerald-500/30";}
function valueCls(v){return v?"bg-emerald-500/15 text-emerald-300 border-emerald-500/30":"bg-rose-500/15 text-rose-300 border-rose-500/30";}
function valueFilter(v){return v===true?"true":"false";}
function reviewedWhere(pred){return CASES.filter(c=>pred(c)&&isDone(c.case_id)).length;}
function targetWhere(pred){return CASES.filter(pred).length;}
function quotaClass(reviewed,target,active){
  if(active)return "bg-emerald-500/15 text-emerald-200 border-emerald-500/50";
  if(target&&reviewed>=target)return "bg-emerald-500/10 text-emerald-300 border-emerald-500/30";
  if(reviewed>0)return "bg-amber-500/10 text-amber-300 border-amber-500/30";
  return "bg-ink-800 text-zinc-400 border-ink-700 hover:border-ink-600";
}
function quotaChip(label,reviewed,target,active,on){
  const div=document.createElement("button");
  div.className=`px-2 py-1 rounded-md text-[11px] border cursor-pointer transition flex items-center gap-1 ${quotaClass(reviewed,target,active)}`;
  div.innerHTML=`<span>${esc(label)}</span><span class="font-mono opacity-80">${reviewed}/${target}</span>`;
  div.onclick=on;
  return div;
}
function applyFilter(next){
  FILT={...FILT,...next};
  rerenderFilters();
}
function resetFilters(){
  FILT={provider:"all",label:"all",surface:"all",status:"pending",value:"all",q:FILT.q};
  rerenderFilters();
}

async function load(){
  try{
    const d=await api("/api/queue");
    CASES=d.cases; PROGRESS=d.progress||{}; META=d.meta||{};
  }catch(e){
    $("#offline").classList.remove("hidden");
    $("#offline").innerHTML='Server not detected. Run <code>python scripts/judge_validation_app.py</code>.';
    return;
  }
  renderChips(); renderList(); updateProgress();
  const first=filtered()[0]||CASES[0];
  if(first) select(first.case_id);
}

function chip(label,n,active,on){
  const div=document.createElement("button");
  div.className=`px-2.5 py-1 rounded-full text-[12px] border cursor-pointer transition flex items-center gap-1.5 ${chipClass(active)}`;
  div.innerHTML=`<span>${esc(label)}</span>${n==null?"":`<span class="font-mono text-zinc-500">${n}</span>`}`;
  div.onclick=on; return div;
}
function countWhere(pred){return CASES.filter(pred).length;}
function quotaTotals(){
  const target=CASES.length;
  const reviewed=CASES.filter(c=>isDone(c.case_id)).length;
  return {target,reviewed,remaining:Math.max(0,target-reviewed),pct:target?reviewed/target:0};
}
function renderQuotaBox(){
  const q=quotaTotals();
  const qt=$("#quotaText"), qf=$("#quotaFill"), qs=$("#quotaSubtext");
  if(!qt||!qf||!qs)return;
  qt.textContent=`${q.reviewed} / ${q.target}`;
  qf.style.width=`${q.pct*100}%`;
  qs.textContent=`${q.remaining} remaining; target ${LEAF_QUOTA_TARGET} per provider leaf slice`;
}
function selectCoreSlice(label,surface,kimiValue){
  applyFilter({provider:"all",label,surface,value:valueFilter(kimiValue),status:"pending"});
}
function selectLeafSlice(provider,label,surface,kimiValue){
  applyFilter({provider,label,surface,value:valueFilter(kimiValue),status:"pending"});
}
function renderSliceChips(){
  const core=$("#coreSliceChips");
  if(core){
    core.innerHTML="";
    core.append(quotaChip("All slices",quotaTotals().reviewed,quotaTotals().target,FILT.provider==="all"&&FILT.label==="all"&&FILT.surface==="all"&&FILT.value==="all",resetFilters));
    LABELS.forEach(label=>{
      SURFACES.forEach(surface=>{
        KIMI_VALUES.forEach(kimiValue=>{
          const pred=c=>c.label===label&&c.surface===surface&&c.kimi_value===kimiValue;
          const reviewed=reviewedWhere(pred);
          const target=targetWhere(pred);
          const active=FILT.provider==="all"&&FILT.label===label&&FILT.surface===surface&&FILT.value===valueFilter(kimiValue);
          const labelText=`${labelShort(label)} / ${surface.replace("_","-")} / ${yesNo(kimiValue)}`;
          core.append(quotaChip(labelText,reviewed,target,active,()=>selectCoreSlice(label,surface,kimiValue)));
        });
      });
    });
  }
  const leaf=$("#leafSliceChips");
  if(leaf){
    leaf.innerHTML="";
    PROVIDERS.forEach(provider=>{
      LABELS.forEach(label=>{
        SURFACES.forEach(surface=>{
          KIMI_VALUES.forEach(kimiValue=>{
            const pred=c=>c.provider_id===provider&&c.label===label&&c.surface===surface&&c.kimi_value===kimiValue;
            const reviewed=reviewedWhere(pred);
            const target=targetWhere(pred);
            const active=FILT.provider===provider&&FILT.label===label&&FILT.surface===surface&&FILT.value===valueFilter(kimiValue);
            const providerMark=provider==="firecrawl"?"fire":provider;
            const labelText=`${providerMark} / ${labelShort(label)} / ${surface==="snippet_only"?"snip":"page"} / ${yesNo(kimiValue)}`;
            leaf.append(quotaChip(labelText,reviewed,target,active,()=>selectLeafSlice(provider,label,surface,kimiValue)));
          });
        });
      });
    });
  }
}
function renderChips(){
  renderQuotaBox();
  const pc=$("#providerChips"); pc.innerHTML=""; pc.append(chip("All",CASES.length,FILT.provider==="all",()=>applyFilter({provider:"all"})));
  PROVIDERS.forEach(p=>pc.append(chip(p,countWhere(c=>c.provider_id===p),FILT.provider===p,()=>applyFilter({provider:p}))));
  const lc=$("#labelChips"); lc.innerHTML=""; lc.append(chip("All",null,FILT.label==="all",()=>applyFilter({label:"all"})));
  LABELS.forEach(l=>lc.append(chip(labelShort(l),countWhere(c=>c.label===l),FILT.label===l,()=>applyFilter({label:l}))));
  const sc=$("#surfaceChips"); sc.innerHTML=""; sc.append(chip("All",null,FILT.surface==="all",()=>applyFilter({surface:"all"})));
  SURFACES.forEach(s=>sc.append(chip(s.replace("_","-"),countWhere(c=>c.surface===s),FILT.surface===s,()=>applyFilter({surface:s}))));
  const st=$("#statusChips"); st.innerHTML=""; STATUSES.forEach(s=>st.append(chip(s.label,null,FILT.status===s.k,()=>applyFilter({status:s.k}))));
  const vc=$("#valueChips"); vc.innerHTML=""; VALUES.forEach(v=>vc.append(chip(v.label,null,FILT.value===v.k,()=>applyFilter({value:v.k}))));
  renderSliceChips();
}
function rerenderFilters(){
  const rows=filtered();
  const shouldMove=rows.length && !rows.some(c=>c.case_id===SEL);
  if(shouldMove)SEL=rows[0].case_id;
  renderChips();renderList();
  if(shouldMove)renderDetail();
}
function filtered(){
  const q=FILT.q.trim().toLowerCase();
  return CASES.filter(c=>{
    if(FILT.provider!=="all"&&c.provider_id!==FILT.provider)return false;
    if(FILT.label!=="all"&&c.label!==FILT.label)return false;
    if(FILT.surface!=="all"&&c.surface!==FILT.surface)return false;
    if(FILT.status==="pending"&&isDone(c.case_id))return false;
    if(FILT.status==="done"&&!isDone(c.case_id))return false;
    if(FILT.value==="true"&&c.kimi_value!==true)return false;
    if(FILT.value==="false"&&c.kimi_value!==false)return false;
    if(q){
      const p=PROGRESS[c.case_id]||{};

function move(step){
  const rows=filtered(); if(!rows.length)return;
  let i=rows.findIndex(c=>c.case_id===SEL); if(i<0)i=0;
  i=(i+step+rows.length)%rows.length; select(rows[i].case_id);
}
function movePending(){
  const rows=filtered(); if(!rows.length)return;
  let i=rows.findIndex(c=>c.case_id===SEL);
  if(i<0){select(rows[0].case_id); return;}
  for(let offset=1; offset<=rows.length; offset++){
    const next=rows[(i+offset)%rows.length];
    if(!isDone(next.case_id)){select(next.case_id); return;}
  }
  move(1);
}

      <section class="reader-card p-4">
        <div class="flex items-center gap-2 mb-2">
          <div class="muted-label">Snippet exactly as sent in Kimi prompt</div>
          <span class="ml-auto text-xs text-zinc-500">${esc(rawSnippet.length)} chars</span>
        </div>
        ${pre(rawSnippet,"max-h-[260px]")}
      </section>`:"";
    content.innerHTML=`
      <div class="space-y-4">
        ${fieldBlock("Title",esc(c.title||""))}
        ${fieldBlock("URL",`<a class="text-sky-300 underline decoration-sky-500/40" href="${esc(c.url)}" target="_blank" rel="noreferrer">${esc(c.url)}</a>`)}
        ${evidenceBlock("Snippet decoded for reading",c.snippet)}
        ${rawSnippetBlock}
        ${extra||evidenceBlock("Extra snippets","")}
        ${rawExtra?`<section class="reader-card p-4"><div class="muted-label mb-3">Raw extra snippets exactly as sent</div>${rawExtra}</section>`:""}
      </div>`;
    return;
  }
  if(ACTIVE_TAB==="page"){
    content.innerHTML=page.text?`
      <section class="reader-card p-4">
        <div class="flex items-center gap-2 mb-3">
          <div class="muted-label">Fetched page excerpt</div>
          <span class="ml-auto text-xs text-zinc-500">chars ${esc(page.start)}-${esc(page.end)} of ${esc(page.total_chars)}${page.truncated?" / excerpted":""}</span>
        </div>
        ${pre(page.text,"max-h-[calc(100vh-250px)]")}
      </section>`:evidenceBlock("Fetched page excerpt","");
    return;
  }
  if(ACTIVE_TAB==="prompt"){
    const messages=c.judge_messages||[];
    const prompt=c.judge_prompt||c.judge_prompt_excerpt||"";
    const doc=promptDocument(prompt);
    const messageBlocks=messages.length?messages.map((m,i)=>`
      <section class="reader-card p-4">
        <div class="flex items-center gap-2 mb-2">
          ${badge(`message ${i+1}`,"bg-ink-800 text-zinc-400 border-ink-700")}
          ${badge(m.role||"role unknown","bg-indigo-500/15 text-indigo-300 border-indigo-500/30")}
          <span class="ml-auto text-xs text-zinc-500">${esc((m.content||"").length)} chars</span>
        </div>
        ${pre(m.content||"","max-h-[520px]")}
      </section>`).join(""):`
      <section class="reader-card p-4">
        <div class="muted-label mb-2">Prompt</div>
        ${pre(prompt,"max-h-[720px]")}
      </section>`;
    content.innerHTML=`
      <div class="space-y-4">
        <section class="reader-card p-4">
          <div class="muted-label mb-2">Prompt audit note</div>
          <div class="text-sm leading-relaxed text-zinc-300">This is the exact chat payload preserved in the Kimi judge JSONL for this URL-level judgment. The retrieved-document block below is the evidence Kimi was asked to judge.</div>
        </section>
        ${doc?`<section class="reader-card p-4">
          <div class="flex items-center gap-2 mb-2">
            <div class="muted-label">Retrieved document block</div>
            <span class="ml-auto text-xs text-zinc-500">${esc(doc.length)} chars</span>
          </div>
          ${pre(doc,"max-h-[620px]")}
        </section>`:""}
        ${messageBlocks}
      </div>`;
    return;
  }
  if(ACTIVE_TAB==="response"){
    const llm=c.llm_response||{};
    const raw=llm.raw_response||{};
    const reasoning=responseReasoning(llm);
    content.innerHTML=`
      <div class="space-y-4">
        <section class="reader-card p-4">
          <div class="grid grid-cols-1 xl:grid-cols-4 gap-3">
            ${fieldBlock("Provider model / id",esc(responseModel(llm)||""))}
            ${fieldBlock("Latency",esc(llm.latency_ms?`${Math.round(llm.latency_ms)} ms`:""))}
            ${fieldBlock("Usage",jsonBlock(llm.usage||raw.usage||{},"max-h-[160px]"))}
            ${fieldBlock("Finish reason",esc(((raw.choices||[])[0]||{}).finish_reason||""))}
          </div>
        </section>
        <section class="reader-card p-4">
          <div class="muted-label mb-2">Parsed provider content</div>
          ${pre(llm.content||"","max-h-[420px]")}
        </section>
        ${reasoning?`<section class="reader-card p-4">
          <div class="muted-label mb-2">Provider reasoning content</div>
          ${pre(reasoning,"max-h-[520px]")}
        </section>`:""}
        <section class="reader-card p-4">
          <div class="muted-label mb-2">Raw provider response JSON</div>
          ${jsonBlock(raw,"max-h-[720px]")}
        </section>
      </div>`;
    return;
  }
  const j=c.judgment||{};
  const spans=[
    ["Answer span",j.answer_span],
    ["Gold snippet span",j.gold_snippet_span],
    ["Gold page span",j.gold_extracted_page_span]
  ].filter(x=>x[1]).map(x=>evidenceBlock(x[0],x[1])).join("");
  content.innerHTML=`
    <div class="space-y-4">
      <section class="reader-card p-4">
        <div class="muted-label mb-3">Kimi booleans</div>
        ${renderJudgment(c)}
      </section>
      ${spans||evidenceBlock("Judge spans","")}
      ${fieldBlock("Prompt excerpt",pre(c.prompt_excerpt||"","max-h-[260px]"))}
    </div>`;
}
function renderJudgePane(){
  const c=caseById(SEL); if(!c)return;
  const p=PROGRESS[c.case_id]||{};
  const agreement=agrees(c);
  const option=(value,label,cls)=>`<button data-human-value="${value}" class="human-value w-full rounded-lg border px-4 py-3 text-left ${p.human_value===value?cls:"bg-ink-800 border-ink-700 text-zinc-300 hover:border-ink-600"}">
      <div class="text-base font-semibold">${label}</div>
      <div class="mt-0.5 text-xs opacity-75">Human value: ${esc(value)}</div>
    </button>`;
  const needsPattern=p.human_value==="unclear" || agreement===false || p.human_disagreement_pattern;
  $("#jhead").innerHTML=`Human validation ${isDone(c.case_id)?badge("done","bg-emerald-500/15 text-emerald-300 border-emerald-500/30"):""}`;
  $("#jbody").innerHTML=`
    <section class="reader-card p-4 mb-4">
      <div class="muted-label mb-2">Your call</div>
      <div class="text-lg leading-snug font-semibold text-zinc-100 mb-4">${esc(labelQuestion(c))}</div>
      <div class="space-y-2">
        ${option("true","Yes","bg-emerald-500/15 text-emerald-300 border-emerald-500/50")}
        ${option("false","No","bg-rose-500/15 text-rose-300 border-rose-500/50")}
        ${option("unclear","Unclear","bg-amber-500/15 text-amber-300 border-amber-500/50")}
      </div>
      <div class="mt-4 grid grid-cols-2 gap-2 text-sm">
        <div class="soft-card p-3"><div class="muted-label mb-1">Kimi</div><div class="font-semibold ${c.kimi_value?"text-emerald-300":"text-rose-300"}">${yesNo(c.kimi_value)}</div></div>
        <div class="soft-card p-3"><div class="muted-label mb-1">Agreement</div><div class="font-semibold ${agreement===true?"text-emerald-300":agreement===false?"text-rose-300":"text-zinc-400"}">${agreement===null?"Pending":agreement?"Yes":"No"}</div></div>
      </div>
    </section>
    <section class="reader-card p-4 mb-4 ${needsPattern?"":"hidden"}">
      <div class="muted-label mb-2">Disagreement pattern</div>
      <select id="pattern" class="w-full bg-ink-800 border border-ink-700 rounded-md px-2.5 py-2 text-sm text-zinc-200 focus:outline-none focus:border-emerald-500">
        ${PATTERNS.map(([v,l])=>`<option value="${esc(v)}" ${p.human_disagreement_pattern===v?"selected":""}>${esc(l)}</option>`).join("")}
      </select>
    </section>
    <section class="reader-card p-4">
      <div class="muted-label mb-2">Notes</div>
      <textarea id="notes" rows="8" class="w-full bg-ink-900 border border-ink-700 rounded-md p-3 text-[15px] leading-relaxed text-zinc-200 focus:outline-none focus:border-emerald-500" placeholder="Reason, uncertainty, useful quote.">${esc(p.human_notes||"")}</textarea>
    </section>`;
  document.querySelectorAll("[data-human-value]").forEach(b=>b.onclick=()=>{setProgress({human_value:b.dataset.humanValue},{advance:true});});
  const pattern=$("#pattern"); if(pattern) pattern.onchange=e=>setProgress({human_disagreement_pattern:e.target.value});
  $("#notes").oninput=e=>{clearTimeout(saveTimer); saveTimer=setTimeout(()=>setProgress({human_notes:e.target.value}),250);};
}
function select(id){SEL=id; renderList(); renderDetail();}

$("#search").oninput=e=>{FILT.q=e.target.value; renderList();};
$("#btnToggleList").onclick=()=>$("#listpane").classList.toggle("hidden");
$("#navPrev").onclick=()=>move(-1);
$("#navNext").onclick=()=>move(1);
$("#navDone").onclick=movePending;
$("#btnSummary").onclick=showSummary;
$("#btnExport").onclick=exportNow;
$("#themeSel").value=document.documentElement.dataset.theme||"fluent";
$("#themeSel").onchange=e=>{document.documentElement.dataset.theme=e.target.value; localStorage.setItem("judge_validation_theme",e.target.value);};
document.addEventListener("keydown",e=>{
  if(e.target&&["TEXTAREA","INPUT","SELECT"].includes(e.target.tagName))return;
  if(e.key==="j"||e.key==="ArrowDown")move(1);
  if(e.key==="k"||e.key==="ArrowUp")move(-1);
  if(e.key==="1")setProgress({human_value:"true"},{advance:true});
  if(e.key==="2")setProgress({human_value:"false"},{advance:true});
  if(e.key==="3")setProgress({human_value:"unclear"},{advance:true});
});
load();
</script>
</body>
</html>
